<body class="bg-cyber-bg text-cyber-text">
  <div id="root"></div>
  <script type="module" src="/src/client/main.jsx"></script>
  <script>
    // Service Worker: unregister any previously-installed SW and clear all caches
    // to avoid stale bundles. Also registers the self-destroying sw.js stub once
    // so existing installs get cleaned up on next visit.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        for (const reg of regs) reg.unregister().catch(() => {});
      }).catch(() => {});
      if (window.caches && caches.keys) {
        caches.keys().then(keys => {
          for (const k of keys) caches.delete(k).catch(() => {});
        }).catch(() => {});
      }
    }
  </script>
